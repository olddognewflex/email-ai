services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: email_ai
      POSTGRES_PASSWORD: email_ai_dev
      POSTGRES_DB: email_ai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U email_ai']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
